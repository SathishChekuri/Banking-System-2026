<!DOCTYPE html>
<html>

<head>

    <title>Transfer Successful</title>

    <link rel="stylesheet"
          href="/css/style.css">

</head>

<body>
<nav>

    <div class="logo">
        Banking System
    </div>

    <ul>

        <li><a href="/">Home</a></li>

    </ul>

</nav>
<div class="main-content">
<div class="success-container">

    <div class="success-card">

        <div class="success-icon">

            ✓

        </div>

        <h1>

            Money Transfer Successful

        </h1>

        <div class="account-details">

            <h2>

                Amount Transferred

            </h2>

            <p>

                ₹ <span th:text="${amount}"></span>

            </p>

            <h2>

                Sent To Account

            </h2>

            <p th:text="${toAccount}"></p>

        </div>

        <a href="/">

            <button>

                Go To Home

            </button>

        </a>

    </div>
</div>
</div>
<footer>
    © 2026 Banking System | Developed by Sathish
</footer>

</body>

</html>
