<!DOCTYPE html>
<html>

<head>

    <title>Transactions</title>

    <link rel="stylesheet"
          href="/css/style.css">

</head>

<body>
<nav>

    <div class="logo">
        Banking System
    </div>

    <ul>

        <li><a href="/">Home</a></li>

    </ul>

</nav>
<div class="main-content">
<div class="form-container">

    <h1>

        Transaction History

    </h1>

    <form action="/viewTransactions"
          method="post">

        <label>

            Account Number *

        </label>

        <input type="text"
               name="accountNumber"
               required>

        <label>

            Password *

        </label>

        <input type="password"
               name="password"
               required>

        <p style="margin-top:10px;">

            Password =
            last 5 digits of phone + DOB

        </p>

        <label>

            From Date *

        </label>

        <input type="date"
               name="fromDate"
               required>

        <label>

            To Date *

        </label>

        <input type="date"
               name="toDate"
               required>
        <p style="color:red;
          font-weight:bold;
          margin-top:15px;"
           th:text="${error}">

         </p>
        <button type="submit">

            View Transactions

        </button>

    </form>

</div>
</div>
<footer>
    © 2026 Banking System | Developed by Sathish
</footer>

</body>

</html>
