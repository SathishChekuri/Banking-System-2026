<!DOCTYPE html>

<html>

<head>

    <title>Admin Login</title>

    <link rel="stylesheet"
          href="/css/style.css">

</head>

<body>
<nav>
    <div class="logo">Banking System</div>

    <ul>
        <li><a href="/">Home</a></li>
    </ul>
</nav>
<div class="main-content">
<div class="form-container">

    <h1>

        Admin Login

    </h1>

    <form action="/adminLogin"
          method="post">

        <label>

            Admin ID

        </label>

        <input type="text"
               name="adminId"
               required>

        <label>

            Password

        </label>

        <input type="password"
               name="password"
               required>
        <p style="color:red;
          font-weight:bold;
          margin-top:15px;"
   th:text="${error}">

</p>
        <button type="submit">

            Login

        </button>

    </form>
</div>
</div>
<footer>
    © 2026 Banking System | Developed by Sathish
</footer>
</body>

</html>
