<!DOCTYPE html>
<html>

<head>

    <title>Balance Details</title>

    <link rel="stylesheet"
          href="/css/style.css">

</head>

<body>
<nav>

    <div class="logo">
        Banking System
    </div>

    <ul>

        <li><a href="/">Home</a></li>

    </ul>

</nav>
<div class="main-content">

<div class="success-container">

    <div class="success-card">

        <div class="success-icon">

            ✓

        </div>

        <h1>

            Account Details

        </h1>

        <div class="account-details">

            <h2>

                Account Number

            </h2>

            <p th:text="${accountNumber}"></p>

            <h2>

                Customer Name

            </h2>

            <p th:text="${name}"></p>

            <h2>

                Available Balance

            </h2>

            <p>

                ₹ <span th:text="${balance}"></span>

            </p>

        </div>

        <a href="/">

            <button>

                Go To Home

            </button>

        </a>

    </div>

</div>
</div>
<footer>
    © 2026 Banking System | Developed by Sathish
</footer>

</body>

</html>
